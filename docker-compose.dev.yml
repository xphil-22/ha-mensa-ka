services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ha-mensa-ka-dev
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./dev/homeassistant/config:/config
      - ./custom_components/mensa_ka:/config/custom_components/mensa_ka:ro

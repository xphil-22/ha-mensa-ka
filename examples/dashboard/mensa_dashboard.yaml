title: KIT Mensa
path: kit-mensa
icon: mdi:silverware-fork-knife
cards:
  - type: vertical-stack
    cards:
      - type: markdown
        title: Today's Overview
        content: >-
          {% set entity = 'sensor.mensa_adenauerring_meal_plan' %}
          {% set day = state_attr(entity, 'day') %}
          {% set lines = state_attr(entity, 'lines') or [] %}
          {% set meal_count = states(entity) %}

          {% if not lines %}
          ## No meals available
          No meals are currently available for this canteen.
          {% else %}
          ## {{ day }}
          **{{ meal_count }} meals**
          {% endif %}

      - type: entities
        title: Canteen Entities
        show_header_toggle: false
        entities:
          - entity: sensor.mensa_adenauerring_meal_plan
            name: Meal plan sensor
          - entity: calendar.mensa_adenauerring
            name: Calendar view

      - type: markdown
        title: Meal Plan
        content: >-
          {% set entity = 'sensor.mensa_adenauerring_meal_plan' %}
          {% set lines = state_attr(entity, 'lines') or [] %}

          {% if not lines %}
          No meals available.
          {% else %}
          {% for line in lines %}
          ### {{ line.line }}

          {% for meal in line.meals %}
          <div style="display: flex; gap: 12px; align-items: flex-start; margin: 0 0 14px 0; padding: 12px; border: 1px solid rgba(127,127,127,0.22); border-radius: 14px; background: rgba(127,127,127,0.08);">
            <div style="width: 84px; min-width: 84px; height: 84px; border-radius: 12px; overflow: hidden; background: rgba(127,127,127,0.16); display: flex; align-items: center; justify-content: center;">
              {% if meal.image_url %}
              <img src="{{ meal.image_url }}" alt="{{ meal.name }}" width="84" height="84" style="width: 84px; height: 84px; object-fit: contain; display: block; background: white;" />
              {% else %}
              <div style="font-size: 28px; line-height: 1;">{{ meal.diet_icon or '🍽️' }}</div>
              {% endif %}
            </div>
            <div style="min-width: 0;">
              <div style="font-weight: 700; margin-bottom: 4px;">{{ meal.diet_icon }} {{ meal.name }}</div>
              {% if meal.diet_label %}
              <div style="opacity: 0.8; margin-bottom: 6px;">{{ meal.diet_label }}</div>
              {% endif %}
              <div>Student: {{ '%.2f'|format(meal.price_student) }} EUR</div>
              {% if meal.price_employee is defined %}
              <div>Employee: {{ '%.2f'|format(meal.price_employee) }} EUR</div>
              {% endif %}
              {% if meal.allergens %}
              <div style="margin-top: 6px;"><strong>Allergens:</strong> {{ meal.allergens | join(', ') }}</div>
              {% endif %}
              {% if meal.additives %}
              <div><strong>Additives:</strong> {{ meal.additives | join(', ') }}</div>
              {% endif %}
            </div>
          </div>

          {% endfor %}
          {% endfor %}
          {% endif %}
